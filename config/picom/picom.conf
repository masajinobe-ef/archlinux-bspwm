#################################
#             Shadows           #
#################################

shadow = false;
shadow-radius = 10;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-exclude = [
  "name = 'Notification'"
];

#################################
#           Fading              #
#################################

fading = false;
fade-in-step = 0.1;
fade-out-step = 0.1;
no-fading-openclose = false

#################################
#           Corners             #
#################################

corner-radius = 5

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "window_type = 'tooltip'",
  "window_type = 'dnd'",
  "window_type = 'popup_menu'",
  "window_type = 'dropdown_menu'",
  "window_type = 'unknown'",
  "window_type = 'menu'",
  "window_type = 'utility'",
  "window_type = 'toolbar'",
  "window_type = 'splash'",
  "window_type = 'dialog'",
  "window_type = 'notification'",
  "window_type = 'combo'"
];

#################################
#       General Settings        #
#################################

backend = "xrender";
dithered-present = false;
vsync = true;

mark-wmwin-focused = true;
mark-ovredir-focused = true;

detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;

glx-no-stencil = true;

use-damage = false;

log-level = "warn";

wintypes:
{
  tooltip = {
    shadow = false; 
    opacity = false; 
  };
  dock = {
    opacity = false; 
    shadow = false;
  };
  dnd = { 
    opacity = false;
    shadow = false;
  };
  popup_menu = {
    opacity = false;
    shadow = false;
  };
  dropdown_menu = {
    opacity = false;
    shadow = false;
  };
  menu = {
    opacity = false;
    shadow = false;
  };
  unknown = {
    opacity = false;
    shadow = false;
  };
  desktop = {
    opacity = false;
    shadow = false;
  };
  utility = {
    opacity = false;
    shadow = false;
  };
  toolbar = {
    opacity = false;
    shadow = false;
  };
  splash = {
    opacity = false;
    shadow = false;
  };
  dialog = {
    opacity = false;
    shadow = false;
  };
  normal = {
    opacity = false;
  };
  notification = {
    opacity = false;
    shadow = false;
  };
  combo = {
    opacity = false;
    shadow = false;
  };
};
